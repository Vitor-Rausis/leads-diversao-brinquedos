services:
  postgres:
    image: postgres:15-alpine
    container_name: evolution-postgres
    environment:
      POSTGRES_DB: evolution
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - evolution_pg_data:/var/lib/postgresql/data

  evolution-api:
    build:
      context: .
      dockerfile: Dockerfile.local
    container_name: evolution-api-local
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      SERVER_TYPE: "http"
      SERVER_PORT: "8080"
      SERVER_URL: "http://localhost:8080"
      CORS_ORIGIN: "*"
      LOG_LEVEL: "ERROR"
      LOG_BAILEYS: "debug"
      DEL_INSTANCE: "false"

      AUTHENTICATION_TYPE: "apikey"
      AUTHENTICATION_API_KEY: "primora-evo-api-2024-secret"
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"

      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: "postgresql"
      DATABASE_CONNECTION_URI: "postgresql://postgres:postgres@postgres:5432/evolution"
      DATABASE_CONNECTION_CLIENT_NAME: "evolution_api"
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "false"
      DATABASE_SAVE_MESSAGE_UPDATE: "false"
      DATABASE_SAVE_DATA_CONTACTS: "false"
      DATABASE_SAVE_DATA_CHATS: "false"

      CONFIG_SESSION_PHONE_VERSION: "2.3000.0"

      CACHE_REDIS_ENABLED: "false"
      CACHE_LOCAL_ENABLED: "true"
    volumes:
      - ./evolution_instances:/evolution/instances
      - ./.env.local:/evolution/.env

volumes:
  evolution_pg_data:
